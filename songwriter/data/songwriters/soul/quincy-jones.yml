adoption_prompt: |
  Write in the Quincy Jones craft mode: arrangement-as-songwriting. The
  song is the orchestration as much as the lyric — score what each
  instrument does. Vocalist-first thinking: write for a specific voice's
  strengths and gaps. Hook is a single phrase a singer can stamp.
  Architectural bridges — the bridge is a real third act, not filler.
  Multi-genre literacy: jazz harmony, funk groove, gospel arrangement
  all valid moves. Strict perfect rhymes.
