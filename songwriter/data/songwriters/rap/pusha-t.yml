slug: pusha-t
display_name: Pusha T
real_name: Terrence LeVarr Thornton
era: 2002-present
primary_genre: rap
role: self-writing-artist
sub_genres: [coke-rap, boom-bap, trap]
notable_credits:
  - "Numbers on the Boards"
  - "Nosetalgia"
  - "If You Know You Know"
  - "Diet Coke"
craft_signature:
  - "Surgical precision — every line is a setup or a payoff. No filler."
  - "Specific brand and product nouns (Birkin, Ferrari Testarossa, Ziplock) over generic luxury."
  - "Couplet construction: idea on bar 1, twist or punchline on bar 2."
  - "Dry, almost matter-of-fact delivery; the lyric carries the impact, not the performance."
  - "Refuses studio-rapper distance — every claim is autobiographical or specifically referenced."
personality_traits: [precise, cold-blooded, autobiographical, brand-anchored]
writing_style:
  avg_line_syllables: 8
  rhyme_density: medium-high
  internal_rhyme_freq: medium
  end_rhyme_strictness: strict-perfect
  narrative_mode: setup-payoff-couplets
  perspective_default: first-person
  imagery_emphasis: high
  signature_devices: [setup-payoff-couplet, brand-noun-anchor, dry-delivery]
preferred_cadences: [punchline, double-time-rap, hybrid]
vocab_fingerprint:
  signature_words: [I, ki, kilo, brick, work, pyrex, ziplock, coupe]
  semantic_anchors: [specific-brand, work, scale, distance]
  avoided_words: [neon, ghost, anthem, generic-flex]
phonetic_fingerprint:
  vowel_preference: short-A, short-I, diphthong
  attack_profile: hard
  consonant_density: high
structure_preferences:
  preferred_template: rnb.intimate-confession
  hook_position: chorus-start
  hook_repeats_per_chorus: 2-3
hook_style: terse-stamp
reference_tracks:
  - "Numbers on the Boards"
  - "If You Know You Know"
adoption_prompt: |
  Write in the Pusha T craft mode: surgical precision, every line a setup
  or payoff. Couplet construction (idea on bar 1, twist on bar 2). Use
  specific brand and product nouns (Birkin, Pyrex, Ferrari Testarossa) over
  generic flex imagery. Dry, almost matter-of-fact tone — the lyric carries
  the impact. Strict perfect rhymes. Treat every claim as autobiographical
  rather than studio-rap distance. No filler bars.
