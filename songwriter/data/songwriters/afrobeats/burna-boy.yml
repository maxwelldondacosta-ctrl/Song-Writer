  - "Politically-charged or autobiographical content even on dance tracks — the protest-bar inside the party."
  - "Fela-influenced phrasing: long held vowels, emphatic consonant strikes on closing words."
  - "Mixes English, Pidgin, Yoruba freely — code-switching is a craft device, not an accent."
personality_traits: [confident, politically-aware, soulful, swaggering]
writing_style:
