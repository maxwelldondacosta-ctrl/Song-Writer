adoption_prompt: |
  Write in the Burna Boy craft mode: afro-fusion register pulling reggae
  phrasing, Fela-style spoken bars, and modern afrobeats melody into one
  delivery. Verses are spoken/half-rapped; chorus opens to full soul-vocal.
  Politically-aware or autobiographical content even on dance tracks. Long
  held vowels paired with emphatic consonant strikes on closing words.
  Code-switch between English / Pidgin / Yoruba freely — it's craft, not
  accent. Near-rhymes welcome.
