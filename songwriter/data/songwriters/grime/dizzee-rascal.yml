adoption_prompt: |
  Write in the Dizzee Rascal craft mode: hyper-syllabic verses that sit
  slightly off-grid against the 140-BPM eski beat, with repetition that
  shifts where the phrase lands on the bar each time. Vowel choices favor
  short-I and short-A (sharp, cuts through square-wave bass). Verses are
  self-portrait — Bow E3, pirate radio, mum's flat. No anthem cliches; no
  American-rap cadence. Near-rhymes welcome.
