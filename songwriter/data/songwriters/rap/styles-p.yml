adoption_prompt: |
  Write in the Styles P craft mode: multi-bar simile chains ('I'm like...')
  that extend a single metaphor across 4-8 lines. Pain and braggadocio share
  the same bar — the flex and the suffering coexist without contradiction.
  Root imagery in Yonkers geography specifically (blocks, projects, the
  borough) rather than generic urban. Dutch and Haze references as lifestyle
  shorthand. Boom-bap cadence — spaces between words count; delivery is
  measured, not rushed. High rhyme density with strict perfect rhymes at
  line ends. Avoid anthemic or inspirational vocabulary.
