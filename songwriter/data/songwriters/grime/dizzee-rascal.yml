personality_traits: [restless, foundational, raw, syllable-dense]
writing_style:
  avg_line_syllables: 10
  rhyme_density: high
  internal_rhyme_freq: high
  end_rhyme_strictness: near-and-perfect
  narrative_mode: self-portrait-with-shift
  perspective_default: first-person
  imagery_emphasis: high
  signature_devices: [off-grid-cadence, repetition-with-rhythmic-shift, pirate-radio-imagery]
preferred_cadences: [grime-swing, double-time-rap, hybrid]
vocab_fingerprint:
  signature_words: [me, I, look, fix, sharp, stand, tall, mate]
  semantic_anchors: [self-portrait, pirate-radio-era, bow]
  avoided_words: [neon, ghost, midnight, anthem]
  vowel_priority_words: [up, look, fix, mate, plate]
