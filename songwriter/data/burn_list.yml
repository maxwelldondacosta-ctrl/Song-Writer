  - { word: paradise,  severity: strong,  drift_direction: pop-cliche,       alternatives: [the-clean-place, no-rules-zone] }
  - { word: pain,      severity: extreme, drift_direction: generic-emotion,  alternatives: [the-ache, soreness, the-bruise] }
