  - "Refuses Nashville-cliche shortcuts (no 'truck-and-beer-and-girl' filler bars); imagery has to do specific work."
  - "Multi-writer instinct: writes for the artist's voice, not his own."
personality_traits: [structural, generous, hit-engineered, character-aware]
