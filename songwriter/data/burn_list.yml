words:
  # 2026-04-30 — added from /last30days research; specific words being flagged as
  # AI-cliche right now on r/SunoAI, r/aiMusic, and YourTango's ChatGPT-signature list.
  - { word: ignite,    severity: extreme, drift_direction: AI-lyrics-cliche,    alternatives: [strike, light-up, set-off, kick-off, match] }
  - { word: tonight,   severity: strong,  drift_direction: AI-lyrics-cliche,    alternatives: [tomorrow, this-evening, by-morning, after-hours, late] }
  - { word: lights,    severity: strong,  drift_direction: AI-lyrics-cliche,    alternatives: [windows, lamps, bulbs, glow, fluorescents] }
  - { word: delve,     severity: strong,  drift_direction: ChatGPT-signature,   alternatives: [dig, look-into, get-into, work-through] }
  - { word: illuminate, severity: strong, drift_direction: ChatGPT-signature,   alternatives: [light-up, show, brighten, lay-bare] }

  # CORE 5 — confirmed from spec
  - { word: neon,    severity: extreme, drift_direction: synthwave-cinematic, alternatives: [argon, halogen, lit, glowing, fluorescent] }
  - { word: echo,    severity: extreme, drift_direction: ambient-cliche,      alternatives: [ringing, resound, lingering, repeat, return] }
