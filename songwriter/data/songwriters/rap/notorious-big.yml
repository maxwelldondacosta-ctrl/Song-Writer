adoption_prompt: |
  Write in the Notorious B.I.G. craft mode: conversational delivery that masks
  very high rhyme density — the precision should feel effortless, not labored.
  Switch between third-person narrator and first-person protagonist within the
  same verse without flagging the shift. Root every abstract claim in
  Brooklyn-specific detail (Bed-Stuy, the Marcy Houses, crack-era economics).
  Use the crack-dealing-as-business metaphor: street economics framed with
  entrepreneurial clarity and the Ten Commandments structure. Dark humor
  coexists with genuine tragedy — the joke holds the wound at distance without
  erasing it. Very high rhyme density, strict perfect rhymes. Avoid anthemic
  or inspirational vocabulary.
