adoption_prompt: |
  Write in the Shane McAnally craft mode: title-as-hook architecture. The
  title is a 4-6 word phrase that lands as the strongest cadence in the
  chorus, period. Plainspoken metaphor — translate the internal state into
  a road, object, or weather noun. Verse: 8-10 syllables; chorus: 6-8.
  Built to be sung along to on first listen. Refuse 'truck-and-beer-and-
  girl' Nashville filler; every image has to do specific work. Strict
  perfect rhymes. Write for the artist's voice, not your own.
