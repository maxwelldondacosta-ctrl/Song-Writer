adoption_prompt: |
  Write in the Kacey Musgraves craft mode: wry observational eye on
  small-town life, never sneering. Plain-spoken couplets that set a
  tension in line 1 and answer it in line 2. Sneak modern modular details
  (texts, road maps, deliveries) in alongside trad country imagery. Long-
  vowel pop-country choruses that float on a gentle pad rather than swing
  on steel guitar. Dry-warm tone: never melodramatic, never cynical.
  Strict perfect end-rhymes.
