adoption_prompt: |
  Write in the Will Putney craft mode: modern deathcore architecture —
  riff-anchored verses, breakdown chugs, optional clean melodic chorus
  pivot. Politically-aware or visceral-personal content; no cartoon-gore.
  Choose breakdown words for the way the throat can hit them ('crawl',
  'rot', 'bury', 'choke'). Production-aware: write the syllable to the
  kick. Near-rhymes welcome.
