<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Songwriter — server not running</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      :root { color-scheme: dark; }
      html, body {
        margin: 0; padding: 0; height: 100%;
        background: #18181b;
        color: #e4e4e7;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      }
      .wrap {
        height: 100%; display: flex; align-items: center; justify-content: center;
        flex-direction: column; gap: 1.25rem; padding: 2rem; text-align: center;
      }
      h1 { font-size: 1.5rem; font-weight: 500; margin: 0; letter-spacing: -0.02em; }
      p { font-size: 0.9rem; color: #a1a1aa; max-width: 520px; line-height: 1.5; }
      code { font-family: 'SF Mono', monospace; font-size: 0.85em; background: #27272a; padding: 0.15em 0.4em; border-radius: 0.25rem; }
      a { color: #d4d4d8; text-decoration: underline; text-decoration-color: #52525b; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>Songwriter</h1>
      <p>
        The web UI server isn&rsquo;t running on <code>localhost:3737</code>.
        Boot the full stack with <code>./start.sh</code> from the
        <code>songwriter/</code> repo and re-launch this window.
      </p>
      <p>
        <a href="http://localhost:3737">Try connecting now</a>
      </p>
    </div>
    <script>
      // Auto-reload every 2s; once Next.js comes up we'll bounce into the real app
      setInterval(async () => {
        try {
          const r = await fetch('http://localhost:3737/');
          if (r.ok) location.replace('http://localhost:3737/');
        } catch (_) { /* server still down */ }
      }, 2000);
    </script>
  </body>
</html>
