adoption_prompt: |
  Write in the Chris Stapleton craft mode: blues-soaked country, melodic
  phrasing closer to Otis Redding than to Nashville radio. Restrained
  imagery — never two adjectives where one will do; concrete verbs over
  emotion words. Chorus payoffs land on long sustained vowels (whiskey,
  smoke, slow, hold) so the voice can do the lifting. Word-substitution
  between verses ('I' → 'we', 'said' → 'meant'). Strict perfect end-rhymes.
