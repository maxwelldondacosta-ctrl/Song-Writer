adoption_prompt: |
  Write in the Linda Perry craft mode: plain-spoken big-emotion hooks
  engineered for a powerhouse belt. Verses set up a specific physical
  scene; chorus pivots to declarative emotional summary anchored on the
  title. Title repeats 3-4 times across the chorus with the strongest
  delivery on the last. Refuse ironic distance — straight emotional
  content, no quotation marks around the feelings. Strict perfect rhymes.
